<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" width="280" height="220">
  <rect width="280" height="220" fill="#f8f4ef" rx="12"/>

  <!-- Labels for two poses -->
  <text x="70" y="20" font-family="Arial, sans-serif" font-size="11" fill="#6c63ff" text-anchor="middle" font-weight="bold">🐄 Cow (หายใจเข้า)</text>
  <text x="210" y="20" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">🐈 Cat (หายใจออก)</text>

  <!-- Divider -->
  <line x1="140" y1="12" x2="140" y2="200" stroke="#d0c8c0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- === COW POSE (left side) === -->
  <!-- Spine arcs DOWN (sag) -->
  <!-- Head UP -->
  <circle cx="30" cy="60" r="13" fill="none" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- Neck angling up from head -->
  <line x1="42" y1="64" x2="55" y2="75" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- Spine curved down (cow) -->
  <path d="M 55 75 Q 90 100 118 78" fill="none" stroke="#6c63ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Tail/rump angling up -->
  <line x1="118" y1="78" x2="128" y2="65" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- Left front arm (down) -->
  <line x1="60" y1="80" x2="58" y2="115" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="115" x2="68" y2="115" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right front arm (down) -->
  <line x1="80" y1="83" x2="78" y2="118" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="118" x2="88" y2="118" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left back leg (down) -->
  <line x1="108" y1="82" x2="106" y2="117" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="98" y1="117" x2="116" y2="117" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right back leg (down) -->
  <line x1="120" y1="78" x2="118" y2="113" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="113" x2="128" y2="113" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Head up arrow -->
  <polygon points="30,46 25,55 35,55" fill="#6c63ff"/>
  <!-- Spine sag arrow -->
  <text x="83" y="105" font-family="Arial, sans-serif" font-size="9" fill="#6c63ff" text-anchor="middle">↓ แอ่นหลัง</text>

  <!-- === CAT POSE (right side) === -->
  <!-- Head DOWN -->
  <circle cx="155" cy="95" r="13" fill="none" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- Neck down -->
  <line x1="167" y1="95" x2="180" y2="87" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- Spine arched UP (cat) -->
  <path d="M 180 87 Q 215 60 248 82" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <!-- Rump down -->
  <line x1="248" y1="82" x2="258" y2="95" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- Left front arm -->
  <line x1="184" y1="90" x2="182" y2="125" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="174" y1="125" x2="192" y2="125" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right front arm -->
  <line x1="200" y1="80" x2="198" y2="115" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="115" x2="208" y2="115" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left back leg -->
  <line x1="232" y1="76" x2="230" y2="111" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="222" y1="111" x2="240" y2="111" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right back leg -->
  <line x1="248" y1="82" x2="246" y2="117" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="238" y1="117" x2="256" y2="117" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Head down arrow -->
  <polygon points="155,111 150,102 160,102" fill="#f59e0b"/>
  <!-- Spine arch arrow -->
  <text x="215" y="64" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">↑ โก่งหลัง</text>

  <!-- Breath guide -->
  <text x="70" y="148" font-family="Arial, sans-serif" font-size="10" fill="#6c63ff" text-anchor="middle">หายใจเข้า</text>
  <text x="210" y="148" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">หายใจออก</text>

  <!-- Title -->
  <text x="140" y="175" font-family="Arial, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="bold">Cat-Cow</text>
  <text x="140" y="192" font-family="Arial, sans-serif" font-size="9" fill="#8a7f74" text-anchor="middle">เคลื่อนไหวตามลมหายใจ ช้าๆ · ไม่เร่ง</text>
</svg>
