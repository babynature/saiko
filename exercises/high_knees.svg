<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <rect width="200" height="240" fill="#f8f4ef" rx="12"/>
  <!-- Floor -->
  <line x1="20" y1="210" x2="180" y2="210" stroke="#b0a69a" stroke-width="3" stroke-linecap="round"/>
  <!-- Person running in place, right knee raised -->
  <!-- Head -->
  <circle cx="105" cy="48" r="17" fill="none" stroke="#2d2d2d" stroke-width="4"/>
  <!-- Neck -->
  <line x1="105" y1="65" x2="105" y2="75" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- Torso (slight forward lean) -->
  <line x1="105" y1="75" x2="100" y2="130" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <!-- Left arm (forward, bent) -->
  <line x1="103" y1="90" x2="125" y2="105" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="125" y1="105" x2="132" y2="125" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- Right arm (back, bent) -->
  <line x1="103" y1="90" x2="78" y2="100" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="100" x2="70" y2="120" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>

  <!-- Right leg (standing, planted) -->
  <line x1="100" y1="130" x2="95" y2="168" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <line x1="95" y1="168" x2="90" y2="210" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <line x1="78" y1="210" x2="102" y2="210" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>

  <!-- Left leg RAISED — knee at hip height — highlighted purple -->
  <line x1="100" y1="130" x2="118" y2="145" stroke="#6c63ff" stroke-width="8" stroke-linecap="round"/>
  <!-- Thigh horizontal / raised -->
  <line x1="118" y1="145" x2="130" y2="130" stroke="#6c63ff" stroke-width="8" stroke-linecap="round"/>
  <!-- Lower leg hanging down from raised knee -->
  <line x1="130" y1="130" x2="138" y2="165" stroke="#6c63ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Foot (pointed slightly) -->
  <line x1="136" y1="163" x2="145" y2="170" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>

  <!-- Hip height dashed line -->
  <line x1="60" y1="130" x2="160" y2="130" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="62" y="127" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" font-weight="bold">ระดับสะดือ</text>

  <!-- Speed arrows on foot -->
  <polygon points="142,172 135,166 140,162" fill="#ef4444"/>

  <!-- Title -->
  <text x="100" y="230" font-family="Arial, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="bold">High Knees</text>
  <text x="100" y="14" font-family="Arial, sans-serif" font-size="9" fill="#8a7f74" text-anchor="middle">ยกเข่าสูงถึงระดับสะดือ · จังหวะเร็ว</text>
</svg>
