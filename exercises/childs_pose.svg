<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200">
  <rect width="260" height="200" fill="#f8f4ef" rx="12"/>
  <!-- Floor -->
  <line x1="20" y1="162" x2="240" y2="162" stroke="#b0a69a" stroke-width="3" stroke-linecap="round"/>

  <!-- Person in child's pose -->
  <!-- Body: folded over knees, arms extended forward -->

  <!-- Knees / lower legs (folded under body, on floor) -->
  <line x1="148" y1="140" x2="148" y2="162" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <line x1="158" y1="162" x2="138" y2="162" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>
  <!-- Feet / heels -->
  <ellipse cx="148" cy="162" rx="18" ry="6" fill="#c8bfb5" stroke="#8a7f74" stroke-width="1.5"/>
  <text x="148" y="165" font-family="Arial, sans-serif" font-size="7" fill="#6a5f57" text-anchor="middle">ส้นเท้า</text>

  <!-- Hips settled on heels / glutes toward heels -->
  <ellipse cx="148" cy="148" rx="20" ry="10" fill="none" stroke="#2d2d2d" stroke-width="3"/>

  <!-- Torso extending forward (low, curved) -->
  <path d="M 140 148 Q 110 138 72 128" fill="none" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>

  <!-- Forehead on floor -->
  <circle cx="58" cy="136" r="12" fill="none" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- Forehead contact point -->
  <ellipse cx="48" cy="148" rx="10" ry="5" fill="#ddd4c8" stroke="#b0a69a" stroke-width="1.5"/>
  <text x="48" y="151" font-family="Arial, sans-serif" font-size="7" fill="#6a5f57" text-anchor="middle">หน้าผาก</text>
  <!-- Neck connecting -->
  <line x1="62" y1="145" x2="70" y2="135" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arms extended forward — highlighted purple -->
  <line x1="75" y1="130" x2="40" y2="120" stroke="#6c63ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="68" y1="135" x2="30" y2="128" stroke="#6c63ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Palms flat indicator -->
  <ellipse cx="22" cy="122" rx="9" ry="5" fill="#c8bfb5" stroke="#6c63ff" stroke-width="2"/>

  <!-- Breath arrows (expand with breath) -->
  <path d="M 115 125 Q 115 115 120 118" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="118" y="112" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">หายใจลึก</text>

  <!-- Title -->
  <text x="130" y="185" font-family="Arial, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="bold">Child's Pose</text>
  <text x="130" y="14" font-family="Arial, sans-serif" font-size="9" fill="#8a7f74" text-anchor="middle">ก้นแตะส้นเท้า · แขนเหยียดตรง · ผ่อนคลาย</text>
</svg>
