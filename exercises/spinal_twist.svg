<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 220" width="260" height="220">
  <rect width="260" height="220" fill="#f8f4ef" rx="12"/>
  <!-- Floor -->
  <line x1="20" y1="185" x2="240" y2="185" stroke="#b0a69a" stroke-width="3" stroke-linecap="round"/>

  <!-- Supine Spinal Twist: lying on back, one knee crossed over body -->

  <!-- Body lying flat: torso horizontal -->
  <!-- Head (turned to right — opposite of knee) -->
  <circle cx="215" cy="108" r="15" fill="none" stroke="#2d2d2d" stroke-width="4"/>
  <!-- Head turned right annotation -->
  <path d="M 215 93 Q 225 85 228 90" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="232" y="88" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">หน้า→</text>

  <!-- Torso (lying) -->
  <line x1="200" y1="115" x2="115" y2="122" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <!-- Hips -->
  <circle cx="113" cy="122" r="6" fill="#2d2d2d"/>

  <!-- Right arm extended out to the right (same side as raised knee) — perpendicular to body -->
  <!-- Actually, arm opposite to knee is extended — let's do: right knee crosses left, right arm extends right -->
  <!-- Extended LEFT arm (out to left, perpendicular) — highlighted to show position -->
  <line x1="185" y1="118" x2="185" y2="150" stroke="#6c63ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="185" y1="150" x2="185" y2="175" stroke="#6c63ff" stroke-width="5" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="185" cy="177" r="6" fill="#9b8ff0" stroke="#6c63ff" stroke-width="2"/>
  <!-- Shoulder staying on floor label -->
  <text x="205" y="145" font-family="Arial, sans-serif" font-size="8" fill="#6c63ff">ไหล่→</text>
  <text x="205" y="155" font-family="Arial, sans-serif" font-size="8" fill="#6c63ff">แนบพื้น</text>

  <!-- Right arm (perpendicular out to other side) -->
  <line x1="185" y1="118" x2="185" y2="90" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>
  <line x1="185" y1="90" x2="183" y2="75" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>

  <!-- Straight left leg (stays on floor) -->
  <line x1="113" y1="122" x2="60" y2="128" stroke="#2d2d2d" stroke-width="7" stroke-linecap="round"/>
  <line x1="60" y1="128" x2="30" y2="130" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <!-- Left foot -->
  <line x1="26" y1="125" x2="30" y2="135" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>

  <!-- RIGHT KNEE: bent and crossed over to LEFT side — highlighted orange (key move) -->
  <!-- Right thigh (from hip, bent at knee) -->
  <line x1="113" y1="122" x2="105" y2="100" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <!-- Right knee (crossed to the left) -->
  <circle cx="103" cy="97" r="7" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <!-- Right shin (from knee, angling down-left — crossed over) -->
  <line x1="103" y1="97" x2="82" y2="118" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <!-- Left hand pulling knee (left hand guides knee down) -->
  <circle cx="80" cy="120" r="7" fill="none" stroke="#2d2d2d" stroke-width="3"/>

  <!-- Twist direction arrow along spine -->
  <path d="M 145 112 Q 135 95 120 105" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="120,105 128,97 127,107" fill="#ef4444"/>
  <text x="150" y="95" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">บิดกระดูก</text>
  <text x="150" y="106" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">สันหลัง</text>

  <!-- Title -->
  <text x="130" y="210" font-family="Arial, sans-serif" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="bold">Supine Spinal Twist</text>
  <text x="130" y="14" font-family="Arial, sans-serif" font-size="9" fill="#8a7f74" text-anchor="middle">ดึงเข่าข้ามลำตัว · ไหล่แนบพื้น · สลับข้าง</text>
</svg>
